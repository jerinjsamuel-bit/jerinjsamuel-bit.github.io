<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JerinKart</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}
header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-size:24px;
font-weight:bold;
}
input{
width:55%;
padding:10px;
border:none;
border-radius:5px;
}
.banner{
background:#fff;
margin:15px;
padding:30px;
text-align:center;
border-radius:10px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}
.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.card img{
width:100%;
border-radius:8px;
}
button{
background:#fb641b;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}
footer{
background:#222;
color:white;
padding:15px;
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">JerinKart</div>
<input placeholder="Search electronics...">
</header>

<div class="banner">
<h2>🔥 Welcome to JerinKart</h2>
<p>Best Deals on Electronics</p>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200x180?text=Smartphone">
<h3>Smartphone</h3>
<p>₹19,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x180?text=Laptop">
<h3>Laptop</h3>
<p>₹49,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x180?text=Headphones">
<h3>Headphones</h3>
<p>₹2,499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200x180?text=Smartwatch">
<h3>Smartwatch</h3>
<p>₹4,999</p>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 JerinKart | Your Trusted Electronics Store
</footer>

</body>
</html>
